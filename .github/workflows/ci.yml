name: GitHub CI Task

on:
    push:
        branches:
            - main

jobs:
    build_and_publish:
        name: Build and publish
        runs-on: ubuntu-latest
        strategy:
            matrix:
                node-version: ['18.x', '20.x']
        steps:
        -
            uses: actions/checkout@v5
        -
            name: Use Node.js ${{ matrix.node-version }}
            uses: actions/setup-node@v4
            with:
                node-version: ${{ matrix.node-version }}
                cache: npm
        -
            name: Install reference packages
            run: |
                npm ci
                cd client
                npm ci
                cd ..
        -
            name: Pull Asphyxia CORE typedef file
            run: curl -o asphyxia.d.ts https://raw.githubusercontent.com/asphyxia-core/core/refs/heads/master/plugins/asphyxia-core.d.ts
        -
            name: Build
            id: build
            run: npm run build -- -ghci
        -
            name: Create release
            env:
                GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            run: gh release create v${{ steps.build.outputs.version }} ./dist/${{ steps.build.outputs.dist_file_name }}.zip --title "v${{ steps.build.outputs.version }}" --notes $"Please remove previous version of the plugin and backup your Asphyxia CORE database files before install this update.\nTo install, unzip the \"rb\" folder into the directory of Asphyxia CORE/plugins.\nIncompatible with CORE versions below v1.5.\nThis file is auto generated by GitHub Actions."