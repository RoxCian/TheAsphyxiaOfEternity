<button class="button is-rounded is-red" [class.is-selected]="value() === 1" (click)="value.set(1)"><i class="mdi mdi-circle-slice-8"></i></button>
<button class="button is-rounded is-random" [class.is-selected]="value() === 0" (click)="value.set(0)"><i class="mdi mdi-dice-multiple"></i></button>
<button class="button is-rounded is-blue" [class.is-selected]="value() === 2" (click)="value.set(2)"><i class="mdi mdi-circle-slice-8"></i></button>
