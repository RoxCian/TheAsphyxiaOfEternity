<button class="button" [class.is-selected]="toInt(value()) === 0" (click)="value.set(0)">0</button>
<button class="button" [class.is-selected]="toInt(value()) === 1" (click)="value.set(1)">+50</button>
<button class="button" [class.is-selected]="toInt(value()) === 2" (click)="value.set(2)">+100</button>
