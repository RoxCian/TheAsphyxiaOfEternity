<div class="card-header" [class.is-folded]="isFolded()" (click)="isFolded.toggle()" bungBreakpoint="mobile">
    <div class="card-hover-background"></div>
    <div class="card-header-title">
        <ng-content select="[cardHeaderTitle]" />
        <i class="card-header-chevron mdi mdi-chevron-down"></i>
    </div>
    <div class="card-header-icon">
        <ng-content select="[cardHeaderAddon]" />
    </div>
</div>
@if (!isFolded()) {
    <div class="card-content" [style.--card-content-height]="cardContentHeight()" animate.enter="card-expand" animate.leave="card-collapse" #cardContent>
        <div class="card-content-wrapper" animate.enter="card-expand" animate.leave="card-collapse" bungBreakpoint="mobile">
            <ng-content />
        </div>
    </div>
}
